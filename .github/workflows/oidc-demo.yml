# Laboratorio de Identidad: OIDC vs Token Estático
name: "Demo OIDC vs Token Estático"

on:
  push:
    branches: [ "demo-oidc" ]

jobs:
  modelo-tradicional:
    name: "Modelo Tradicional (Vulnerable)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Sonda de exfiltración (Escenario Estático)
        env:
          # Inyección clásica: El secreto queda expuesto en el process.env 
          # durante toda la ejecución del job, siendo un objetivo fácil.
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node probe-token.js

  modelo-oidc:
    name: "Modelo OIDC (Trusted Publishing)"
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # [CRÍTICO] Otorga identidad efímera al runner
      contents: read
    steps:
      - name: Checkout del código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Sonda de exfiltración (Escenario OIDC)
        # Al basarnos en short-lived tokens de GitHub hacia el proveedor,
        # no existen variables de entorno estáticas que inyectar.
        run: node probe-token.js